name = "fish-cost-calculator"
main = "worker/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "app/dist"

[[d1_databases]]
binding = "DB"
database_name = "fish-cost-calculator"
database_id = "997dfe18-7b5f-4c4d-97f4-b84c68b5ee4f"

# Required environment variables (set via `wrangler secret put` or CF dashboard):
#
# BETTER_AUTH_SECRET        - Auth session signing key (generate: openssl rand -hex 32)
# ALLOWED_ORIGINS           - Comma-separated CORS origins (e.g. https://yourdomain.com,http://localhost:5173)
#
# Optional:
# GOOGLE_CLIENT_ID          - Google OAuth client ID (enables "Sign in with Google")
# GOOGLE_CLIENT_SECRET      - Google OAuth client secret
# APP_URL                   - Production URL override (defaults to CF_PAGES_URL or request origin)
